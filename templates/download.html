<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>İndir — Akıllı Metin → PDF</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="{{ url_for('index') }}">Akıllı Metin → PDF</a>
    </div>
  </nav>

  <main class="container py-5">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="card shadow border-0 mx-auto" style="max-width: 28rem;">
      <div class="card-body p-4 text-center">
        <h1 class="h4 mb-3">PDF hazır</h1>
        <p class="text-muted mb-4">{{ doc_title }}</p>
        <a class="btn btn-success btn-lg w-100 mb-2" href="{{ url_for('download_file', filename=filename) }}">PDF’yi indir</a>
        <a class="btn btn-outline-secondary w-100" href="{{ url_for('index') }}">Yeni belge</a>
      </div>
    </div>
  </main>
</body>
</html>
